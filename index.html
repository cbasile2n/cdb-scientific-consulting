<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDB BioAI | Explainable Biomedical Intelligence</title>
  <style>
    :root {
      --bg: #070b14;
      --bg-soft: #0d1320;
      --panel: rgba(13, 19, 32, 0.88);
      --panel-2: rgba(17, 24, 39, 0.94);
      --line: rgba(140, 196, 255, 0.18);
      --text: #eef4ff;
      --muted: #9fb1c9;
      --accent: #89d3ff;
      --accent-2: #5ca7ff;
      --glow: 0 0 30px rgba(108, 184, 255, 0.18);
      --radius: 22px;
      --max: 1220px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(73, 140, 255, 0.18), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(87, 205, 255, 0.16), transparent 20%),
        radial-gradient(circle at 70% 80%, rgba(57, 94, 179, 0.16), transparent 28%),
        linear-gradient(180deg, #04070d 0%, #070b14 100%);
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    .container { width: min(var(--max), calc(100% - 40px)); margin: 0 auto; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: rgba(4, 8, 15, 0.8);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 84px;
      gap: 20px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-mark {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: #d8ebff;
    }

    .brand-sub {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      color: #dfe9f8;
    }

    .nav-links a { opacity: 0.9; }
    .nav-links a:hover { opacity: 1; color: var(--accent); }

    .nav-cta {
      padding: 12px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      transition: 0.2s ease;
    }

    .nav-cta:hover {
      border-color: rgba(137, 211, 255, 0.6);
      box-shadow: var(--glow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 96px 0 84px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(4,7,13,0.92) 0%, rgba(4,7,13,0.78) 45%, rgba(4,7,13,0.38) 100%),
        radial-gradient(circle at 70% 35%, rgba(124, 198, 255, 0.2), transparent 22%),
        repeating-linear-gradient(120deg, rgba(133, 192, 255, 0.06) 0 2px, transparent 2px 78px);
      pointer-events: none;
    }

    .hero-grid {
      position: relative;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 34px;
      align-items: end;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 8px 14px;
      background: rgba(137, 211, 255, 0.09);
      border: 1px solid rgba(137, 211, 255, 0.16);
      border-radius: 999px;
      color: #cfe8ff;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.7rem, 7vw, 5.2rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
      max-width: 760px;
    }

    .hero p.lead {
      margin: 0 0 30px;
      max-width: 680px;
      font-size: 1.15rem;
      color: var(--muted);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #04101b;
      box-shadow: 0 16px 40px rgba(92, 167, 255, 0.2);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.12);
      color: var(--text);
    }

    .btn:hover { transform: translateY(-1px); }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 16px;
    }

    .stat {
      padding: 18px;
      background: rgba(10, 16, 29, 0.72);
      border: 1px solid rgba(137, 211, 255, 0.12);
      border-radius: 18px;
      box-shadow: var(--glow);
    }

    .stat strong {
      display: block;
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: #eff7ff;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .hero-panel {
      padding: 24px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(11, 18, 30, 0.92), rgba(11, 18, 30, 0.72));
      border: 1px solid rgba(137, 211, 255, 0.12);
      box-shadow: var(--glow);
    }

    .hero-panel h3 {
      margin: 0 0 14px;
      font-size: 1.2rem;
    }

    .hero-panel p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .panel-list {
      display: grid;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .panel-list li {
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      color: #d7e6f7;
    }

    section {
      padding: 36px 0 84px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 26px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.03em;
    }

    .section-head p {
      margin: 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .overview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 14px;
    }

    .feature-large {
      min-height: 440px;
      padding: 34px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(12, 18, 31, 0.92), rgba(8, 13, 24, 0.9)),
        radial-gradient(circle at 15% 85%, rgba(124, 198, 255, 0.16), transparent 22%);
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }

    .feature-large::after {
      content: "";
      position: absolute;
      inset: auto -5% -25% 5%;
      height: 60%;
      background:
        radial-gradient(circle at 20% 20%, rgba(147, 209, 255, 0.18), transparent 16%),
        repeating-linear-gradient(115deg, rgba(137, 211, 255, 0.08) 0 2px, transparent 2px 34px);
      filter: blur(0.4px);
      opacity: 0.8;
      transform: skewY(-8deg);
    }

    .feature-large h3 {
      margin: 0 0 14px;
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      font-weight: 300;
      letter-spacing: -0.05em;
      position: relative;
      z-index: 1;
    }

    .feature-large p {
      position: relative;
      z-index: 1;
      max-width: 430px;
      margin: 0;
      color: var(--muted);
      font-size: 1.12rem;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 20px;
    }

    .card {
      padding: 28px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: var(--glow);
    }

    .icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(137, 211, 255, 0.18);
      background: rgba(137, 211, 255, 0.06);
      color: var(--accent);
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    .card h4 {
      margin: 0 0 12px;
      font-size: 1.6rem;
      letter-spacing: -0.03em;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .divider {
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(137,211,255,0.32), rgba(255,255,255,0.02));
      margin-top: 20px;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 24px;
    }

    .service {
      border-radius: 28px;
      padding: 28px;
      background: linear-gradient(180deg, rgba(11, 18, 30, 0.86), rgba(11, 18, 30, 0.95));
      border: 1px solid var(--line);
      box-shadow: var(--glow);
    }

    .service-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(137, 211, 255, 0.1);
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .service h3 {
      margin: 0 0 18px;
      font-size: 1.8rem;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

      padding: 22px;
      border-radius: 20px;
      background: rgb
